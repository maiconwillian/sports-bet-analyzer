spring:
  application:
    name: sports-bet-analyzer
  datasource:
    url: jdbc:postgresql://localhost:5432/oddwise
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false # Desabilitado por enquanto para usar create-drop do Hibernate como solicitado

logging:
  level:
    root: INFO
    com.betanalyzer: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

server:
  port: 8080
