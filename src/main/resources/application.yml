spring:
  application:
    name: sports-bet-analyzer
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:postgresql://localhost:5432/oddwise
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # Validar apenas, não criar/alterar
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

logging:
  level:
    com.betanalyzer: DEBUG  # ← MUDOU DE INFO PARA DEBUG
    org.flywaydb: INFO
    root: WARN

server:
  port: 8080

api:
  football:
    base-url: https://v3.football.api-sports.io
    key: ${API_FOOTBALL_KEY:71f295f76d69f0b9614f1fff3470b06a}
    host: v3.football.api-sports.io
    connect-timeout-ms: 5000
    read-timeout-ms: 10000
  odds:
    base-url: https://api.the-odds-api.com/v4
    key: ${ODDS_API_KEY:63d7269ab5b2546f054a5c621e7570bb}
    regions: us,eu
    connect-timeout-ms: 5000
    read-timeout-ms: 10000

app:
  data-quality:
    minimum-threshold: 85
    filter-amistosos: true
    filter-pre-temporada: true
    filter-estaduais: true
    supported-leagues:
      - BRASILEIRAO
      - PREMIER_LEAGUE
      - CHAMPIONS_LEAGUE
      - LA_LIGA
      - BUNDESLIGA
      - SERIE_A
    supported-markets:
      - OVER_2_5
      - BTTS
  value-bet:
    min-ev: 0.05
    min-confidence: 65.0
    kelly-fraction: 0.25
    bankroll: 1000.0
  backtest:
    min-sample-bets: 30
  enrich:
    auto-after-sync: false
    last-fixtures-for-form: 10
